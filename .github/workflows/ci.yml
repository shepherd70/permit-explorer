name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build site (assemble dist/index.html)
        run: python build.py

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run test harness
        run: npm test
