name: Deploy to GitHub Pages

# Publishes the city-wide explorer as the site root (index.html) plus the
# freshly-built offline dashboard. Requires Pages enabled with "GitHub Actions"
# as the source (Settings → Pages). Note: GitHub Pages on a PRIVATE repo needs a
# paid plan — make the repo public to host it for free.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pandas
        run: pip install -r requirements.txt

      - name: Build offline dashboard
        run: python build.py

      - name: Assemble site
        run: |
          mkdir -p _site
          cp src/city_explorer.html _site/index.html
          cp dist/permit_dashboard.html _site/permit_dashboard.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
